{% extends "milk_agency/home/base.html" %}

{% block title %}Add Plan Item{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="fw-bold mb-4">
    <i class="bi bi-plus-circle"></i> Add Item to Plan
  </h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label for="item" class="form-label">Item</label>
      {{ form.item|as_crispy_field }}
    </div>
    <div class="mb-3">
      <label for="quantity" class="form-label">Quantity</label>
      {{ form.quantity|as_crispy_field }}
    </div>
    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-circle"></i> Add Item
      </button>
      <a href="{% url 'milk_agency:subscription_dashboard' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>
  </form>
</div>
{% endblock %}
