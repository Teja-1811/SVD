{% extends "milk_agency/home/base.html" %}

{% block title %}Assign Subscription{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="fw-bold mb-4">
    <i class="bi bi-person-plus"></i> Assign Subscription
  </h2>
  <form method="post" class="needs-validation" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label for="id_customer" class="form-label">Customer</label>
      <select name="customer" id="id_customer" class="form-select" required>
        <option value="" disabled selected>Select a customer</option>
        {% for customer in customers %}
        <option value="{{ customer.id }}">{{ customer.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="id_subscription_plan" class="form-label">Subscription Plan</label>
      <select name="subscription_plan" id="id_subscription_plan" class="form-select" required>
        <option value="" disabled selected>Select a subscription plan</option>
        {% for plan in plans %}
        <option value="{{ plan.id }}">{{ plan.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="id_start_date" class="form-label">Start Date</label>
      <input type="date" name="start_date" id="id_start_date" class="form-control" required>
    </div>
    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-circle"></i> Assign Subscription
      </button>
      <a href="{% url 'milk_agency:subscription_dashboard' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>
  </form>
</div>
{% endblock %}
