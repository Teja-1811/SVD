{% extends "milk_agency/home/base.html" %}

{% block title %}Create Subscription Plan{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="fw-bold mb-4">
    <i class="bi bi-journal-plus"></i> Create Subscription Plan
  </h2>
  <form method="post" class="needs-validation" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label for="id_name" class="form-label">Plan Name</label>
      <input type="text" name="name" id="id_name" class="form-control" placeholder="Enter plan name" required>
    </div>
    <div class="mb-3">
      <label for="id_price" class="form-label">Price (₹)</label>
      <input type="number" name="price" id="id_price" class="form-control" placeholder="Enter price" required>
    </div>
    <div class="mb-3">
      <label for="id_description" class="form-label">Description</label>
      <textarea name="description" id="id_description" class="form-control" placeholder="Enter description" rows="3"></textarea>
    </div>
    <div class="mb-3">
      <label for="id_duration_in_days" class="form-label">Duration (Days)</label>
      <input type="number" name="duration_in_days" id="id_duration_in_days" class="form-control" placeholder="Enter duration in days" required>
    </div>
    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-circle"></i> Create Plan
      </button>
      <a href="{% url 'milk_agency:subscription_dashboard' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>
  </form>
</div>
{% endblock %}
