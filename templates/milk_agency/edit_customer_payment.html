{% extends "milk_agency/home/base.html" %}

{% block title %}Edit Payment{% endblock %}

{% block content %}
<style>
    .cp-form-card {
        border-radius: 20px;
        border: 1px solid rgba(23,53,62,0.1);
        background: rgba(255,255,255,0.96);
        box-shadow: 0 18px 42px rgba(23,53,62,0.08);
    }

    .cp-form-card .card-header {
        background: #f8fbfc;
        border-bottom: 1px solid rgba(23,53,62,0.08);
    }

    .cp-form-card .form-control,
    .cp-form-card .form-select {
        border-radius: 12px;
        min-height: 46px;
    }
</style>

<div class="container-fluid py-4 ma-page-shell">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Edit Payment</h2>
        <a href="{% url 'milk_agency:customer_payments' %}" class="btn btn-secondary">Back to Payments</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card cp-form-card">
                <div class="card-header py-3">
                    <h6 class="m-0 fw-bold text-primary">Payment Details</h6>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Customer</label>
                            <input type="text" class="form-control" value="{{ payment.customer.name }} ({{ payment.customer.phone }})" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Transaction ID</label>
                            <input type="text" class="form-control" value="{{ payment.transaction_id }}" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Amount</label>
                            <input type="number" step="0.01" min="0" name="amount" class="form-control" value="{{ payment.amount }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Method</label>
                            <input type="text" name="method" class="form-control" value="{{ payment.method }}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select" required>
                                <option value="SUCCESS" {% if payment.status == 'SUCCESS' %}selected{% endif %}>SUCCESS</option>
                                <option value="FAILED" {% if payment.status == 'FAILED' %}selected{% endif %}>FAILED</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Update Payment</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
