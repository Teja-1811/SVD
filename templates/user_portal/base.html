{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Portal{% endblock %}</title>
    <link rel="icon" href="{% static 'favicon.ico' %}" sizes="any">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/user_portal.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="user-portal-body">
    <div class="up-shell">
        <nav class="navbar navbar-expand-xl up-navbar fixed-top">
            <div class="container up-container">
                <a class="up-brand" href="{% url 'users:dashboard' %}">
                    <span class="up-brand-mark"><i class="bi bi-droplet-half"></i></span>
                    <span class="up-brand-text">
                        <strong>User Portal</strong>
                        <small>SVD Agencies</small>
                    </span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userPortalNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="userPortalNav">
                    <ul class="navbar-nav ms-4 me-auto up-nav">
                        <li class="nav-item"><a class="nav-link up-nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'users:dashboard' %}"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a></li>
                        <li class="nav-item"><a class="nav-link up-nav-link {% if request.resolver_match.url_name == 'orders' %}active{% endif %}" href="{% url 'users:orders' %}"><i class="bi bi-bag-check-fill"></i><span>Orders</span></a></li>
                        <li class="nav-item"><a class="nav-link up-nav-link {% if request.resolver_match.url_name == 'offers' %}active{% endif %}" href="{% url 'users:offers' %}"><i class="bi bi-stars"></i><span>Offers</span></a></li>
                        <li class="nav-item"><a class="nav-link up-nav-link {% if request.resolver_match.url_name == 'subscriptions' %}active{% endif %}" href="{% url 'users:subscriptions' %}"><i class="bi bi-calendar-week"></i><span>Subscriptions</span></a></li>
                        <li class="nav-item"><a class="nav-link up-nav-link" href="{% url 'customer_portal:reports_dashboard' %}"><i class="bi bi-receipt-cutoff"></i><span>Invoices</span></a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-2">
                        <span class="up-muted">{{ user.name }}</span>
                        <a class="up-btn-secondary" href="{% url 'customer_portal:logout' %}" style="padding:.65rem 1rem;">Logout</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="up-main">
            <div class="container up-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
