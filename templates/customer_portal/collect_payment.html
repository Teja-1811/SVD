{% extends "customer_portal/base.html" %}
{% load static %}

{% block title %}Pay Outstanding Due{% endblock %}

{% block extra_css %}
<style>
.cp-payment-hero {
    text-align: center;
    padding: 2.5rem 1.5rem;
    background: linear-gradient(135deg, #187f62 0%, #16664d 100%);
    border-radius: 24px;
    color: white;
    margin-bottom: 2rem;
}

.cp-hero-amount {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 800;
}

.cp-amount-section {
    background: #f8fafc;
    border-radius: 24px;
    padding: 2rem;
    text-align: center;
}

.cp-pay-btn {
    background: linear-gradient(135deg, #187f62 0%, #16664d 100%);
    border-radius: 16px;
    padding: 1.25rem;
    color: white;
    font-weight: 700;
}

.modal-backdrop {
    z-index: 1040 !important;
}
.modal {
    z-index: 1050 !important;
}
</style>
{% endblock %}

{% block content %}
<div class="container">

    <!-- HERO -->
    <div class="cp-payment-hero">
        <h2>Outstanding Balance</h2>
        <div class="cp-hero-amount">₹{{ outstanding_due }}</div>
    </div>

    <!-- AMOUNT -->
    <div class="cp-amount-section">

        <input type="hidden" value="{{ csrf_token }}" id="csrfToken">

        <input type="number" id="paymentAmount"
            class="form-control mb-3"
            placeholder="Enter amount"
            value="{{ suggested_upi_amount }}">

        <button id="startPaytmBtn" class="cp-pay-btn w-100" disabled>
            Continue to Paytm
        </button>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="paymentConfirmModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">

            <h4 class="text-center">Confirm Payment</h4>

            <h3 id="confirmAmount" class="text-center text-success">₹0</h3>

            <div id="paymentStepNote" class="alert alert-info" style="display:none;"></div>

            <div class="text-center mt-3">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="confirmPaytmBtn" class="btn btn-success">
                    Pay with Paytm
                </button>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {

    const amountInput = document.getElementById('paymentAmount');
    const startBtn = document.getElementById('startPaytmBtn');
    const confirmAmount = document.getElementById('confirmAmount');
    const paymentNote = document.getElementById('paymentStepNote');
    const modalEl = document.getElementById('paymentConfirmModal');
    const modal = new bootstrap.Modal(modalEl);

    const csrf = document.getElementById('csrfToken').value;

    let paymentData = null;
    let readyToLaunch = false;

    // ENABLE BUTTON
    amountInput.addEventListener('input', () => {
        startBtn.disabled = !(parseFloat(amountInput.value) > 0);
    });

    // STEP 1: PREPARE PAYMENT
    startBtn.addEventListener('click', async () => {

        const amount = parseFloat(amountInput.value);

        startBtn.innerText = "Preparing...";
        startBtn.disabled = true;

        try {
            const res = await fetch("/customer/collect-payment/start/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrf
                },
                body: JSON.stringify({ amount })
            });

            const data = await res.json();

            if (!data.txnToken) {
                alert("Token missing");
                reset();
                return;
            }

            paymentData = data;
            confirmAmount.innerText = "₹" + data.amount;

            modal.show();

        } catch (e) {
            alert("Error");
            reset();
        }
    });

    function reset() {
        startBtn.innerText = "Continue to Paytm";
        startBtn.disabled = false;
    }

    // STEP 2: CONFIRM
    document.getElementById('confirmPaytmBtn').addEventListener('click', () => {

        if (!paymentData) return alert("Not ready");

        paymentNote.style.display = "block";
        paymentNote.innerText = "Opening Paytm...";

        readyToLaunch = true;
        modal.hide();
    });

    // STEP 3: AFTER MODAL CLOSE → OPEN PAYTM
    modalEl.addEventListener('hidden.bs.modal', async () => {

        if (!readyToLaunch) return;
        readyToLaunch = false;

        await startPaytm(paymentData);
    });

    async function loadScript(url) {
        return new Promise((resolve, reject) => {

            if (window.Paytm) return resolve();

            const s = document.createElement("script");
            s.src = url;
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
        });
    }

    async function startPaytm(data) {

        try {
            await loadScript(data.checkout_js_url);

            const config = {
                root: "",
                flow: "DEFAULT",
                data: {
                    orderId: data.order_id,
                    token: data.txnToken,
                    tokenType: "TXN_TOKEN",
                    amount: data.amount
                },
                handler: {
                    notifyMerchant: function (e, res) {

                        if (res.STATUS === "TXN_SUCCESS") {
                            alert("Success");
                            location.reload();
                        } else {
                            alert("Failed");
                        }
                    }
                },
                merchant: {
                    mid: data.mid,
                    redirect: false
                }
            };

            window.Paytm.CheckoutJS.init(config)
                .then(() => window.Paytm.CheckoutJS.invoke());

        } catch (e) {
            alert("Paytm failed");
            reset();
        }
    }

});
</script>
{% endblock %}
