<!DOCTYPE html>
<html>
<head>
    <title>Pay with Paytm</title>

    <!-- Paytm JS -->
    <script src="https://securegw-stage.paytm.in/merchantpgpui/checkoutjs/merchants/{{ checkout.mid }}.js"></script>
</head>
<body>

<h2>Processing Payment...</h2>

<script>
    function startPaytm() {

        var config = {
            "root": "",
            "flow": "DEFAULT",
            "data": {
                "orderId": "{{ checkout.order_id }}",
                "token": "{{ checkout.txn_token }}",
                "tokenType": "TXN_TOKEN",
                "amount": "{{ checkout.amount }}"
            },
            "handler": {
                notifyMerchant: function(eventName, data) {

                    console.log("EVENT:", eventName);
                    console.log("DATA:", data);

                    // ✅ PAYMENT SUCCESS
                    if (data.STATUS === "TXN_SUCCESS") {

                        fetch("{% url 'verify_payment' %}", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "X-CSRFToken": "{{ csrf_token }}"
                            },
                            body: JSON.stringify({
                                order_id: data.ORDERID
                            })
                        })
                        .then(res => res.json())
                        .then(res => {
                            if (res.success) {
                                alert("Payment successful");
                                window.location.href = "{% url 'customer_portal:home' %}";
                            } else {
                                alert("Verification failed");
                            }
                        });
                    }

                    // ❌ FAILED
                    if (data.STATUS === "TXN_FAILURE") {
                        alert("Payment failed");
                    }
                }
            },
            "merchant": {
                "redirect": false
            }
        };

        if (window.Paytm && window.Paytm.CheckoutJS) {
            window.Paytm.CheckoutJS.onLoad(function () {
                window.Paytm.CheckoutJS.init(config).then(function () {
                    window.Paytm.CheckoutJS.invoke();
                }).catch(function (error) {
                    console.log("Paytm Error:", error);
                });
            });
        }
    }

    // Auto start
    window.onload = startPaytm;
</script>

</body>
</html>
